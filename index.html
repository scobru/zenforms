<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZenForms | Decentralized E2EE Forms & Polls</title>
  <meta name="description" content="ZenForms - End-to-End Encrypted Private Form & Live Poll Builder by Scobru.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --font-sans: 'Outfit', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;

      --accent: #10b981;
      --accent-hover: #059669;
      --accent-light: rgba(16, 185, 129, 0.12);
      --accent-border: rgba(16, 185, 129, 0.3);
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --warning: #f59e0b;
      --info: #3b82f6;
    }

    [data-theme="light"] {
      --bg-app: #f8fafc;
      --bg-sidebar: #ffffff;
      --bg-card: #ffffff;
      --bg-modal: #ffffff;
      --bg-input: #f1f5f9;
      --bg-hover: #f1f5f9;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --border-color: rgba(0, 0, 0, 0.08);
      --border-hover: rgba(0, 0, 0, 0.16);
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
      --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.12);
    }

    [data-theme="dark"] {
      --bg-app: #090d14;
      --bg-sidebar: #0f172a;
      --bg-card: #1e293b;
      --bg-modal: #1e293b;
      --bg-input: #0f172a;
      --bg-hover: #334155;
      --text-primary: #f8fafc;
      --text-secondary: #cbd5e1;
      --text-muted: #64748b;
      --border-color: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(255, 255, 255, 0.18);
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.6);
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-app);
      color: var(--text-primary);
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* Auth Passphrase Overlay */
    .auth-overlay {
      position: fixed;
      inset: 0;
      background: rgba(9, 13, 20, 0.92);
      backdrop-filter: blur(16px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-card {
      background: var(--bg-sidebar);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--shadow-lg);
      text-align: center;
    }

    .auth-icon {
      width: 64px;
      height: 64px;
      background: var(--accent-light);
      color: var(--accent);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 20px;
    }

    .auth-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .auth-sub {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 24px;
      line-height: 1.4;
    }

    /* App Layout */
    .app-sidebar {
      width: 260px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text-primary);
    }

    .brand-logo {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 22px;
      box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);
    }

    .brand-text {
      font-weight: 700;
      font-size: 1.25rem;
      letter-spacing: -0.02em;
    }

    .brand-badge {
      font-size: 0.65rem;
      font-family: var(--font-mono);
      background: var(--accent-light);
      color: var(--accent);
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
    }

    .nav-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      list-style: none;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-family: var(--font-sans);
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      width: 100%;
      text-align: left;
    }

    .nav-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .nav-btn.active {
      background: var(--accent-light);
      color: var(--accent);
      font-weight: 600;
    }

    .nav-btn i {
      font-size: 20px;
    }

    .sidebar-footer {
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 16px;
      border-top: 1px solid var(--border-color);
    }

    .theme-toggle {
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .theme-toggle:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Main Area */
    .app-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      height: 64px;
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-sidebar);
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .topbar-title {
      font-size: 1.15rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .content-area {
      flex: 1;
      overflow-y: auto;
      padding: 28px;
    }

    /* Common Buttons & Controls */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 18px;
      border-radius: 10px;
      font-family: var(--font-sans);
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-primary {
      background: var(--accent);
      color: #ffffff;
      box-shadow: 0 2px 8px rgba(16, 185, 129, 0.25);
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.35);
    }

    .btn-secondary {
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
    }

    .btn-secondary:hover {
      background: var(--bg-hover);
      border-color: var(--border-hover);
    }

    .btn-danger {
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .btn-danger:hover {
      background: var(--danger);
      color: #ffffff;
    }

    .input-field {
      width: 100%;
      padding: 11px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      font-family: var(--font-sans);
      font-size: 0.95rem;
      color: var(--text-primary);
      outline: none;
      transition: border 0.15s ease;
    }

    .input-field:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }

    /* Cards & Grid */
    .grid-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: all 0.2s ease;
    }

    .card:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--border-hover);
      transform: translateY(-2px);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .card-sub {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .badge-responses {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      background: var(--accent-light);
      color: var(--accent);
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
    }

    /* Form Builder */
    .builder-container {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .field-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
    }

    .field-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .option-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }

    /* Live Poll Chart */
    .poll-result-bar-bg {
      height: 12px;
      background: var(--bg-input);
      border-radius: 6px;
      overflow: hidden;
      margin-top: 6px;
    }

    .poll-result-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 6px;
      transition: width 0.4s ease;
    }

    /* Respondent Form */
    .respondent-container {
      max-width: 640px;
      margin: 20px auto;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 32px;
      box-shadow: var(--shadow-md);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.6;
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--bg-sidebar);
      border: 1px solid var(--accent);
      color: var(--text-primary);
      padding: 12px 20px;
      border-radius: 12px;
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 3000;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s ease;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .spin {
      animation: spin 1s linear infinite;
      display: inline-block;
    }

    /* Mobile Navigation & Responsive Styles */
    .sidebar-toggle {
      display: none;
    }

    .hamburger-close {
      display: none;
    }

    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      z-index: 199;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .sidebar-overlay.show {
      display: block;
      opacity: 1;
    }

    @media (max-width: 768px) {
      .sidebar-toggle {
        display: flex;
      }

      .hamburger-close {
        display: flex;
      }

      .app-sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        z-index: 200;
        transform: translateX(-100%);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        box-shadow: none;
      }

      .app-sidebar.open {
        transform: translateX(0);
        box-shadow: 10px 0 30px rgba(0, 0, 0, 0.25);
      }

      .topbar {
        padding: 0 12px;
        gap: 8px;
      }

      .content-area {
        padding: 16px;
      }

      .grid-cards {
        grid-template-columns: 1fr;
      }

      .btn {
        font-size: 0.8rem;
        padding: 8px 12px;
      }

      .topbar-title {
        font-size: 1rem;
      }

      .field-card-header {
        flex-wrap: wrap;
      }

      .builder-container {
        gap: 16px;
      }
    }

    @media (max-width: 480px) {
      .content-area {
        padding: 12px;
      }

      .topbar {
        padding: 0 10px;
        height: 56px;
      }

      .card {
        padding: 16px;
      }

      .respondent-container {
        padding: 20px;
        margin: 12px;
      }
    }
  </style>
</head>

<body>

  <!-- Auth Lock Overlay -->
  <div class="auth-overlay" id="authOverlay">
    <div class="auth-card">
      <div class="auth-icon">
        <i class="ti ti-forms"></i>
      </div>
      <h2 class="auth-title">ZenForms Vault</h2>
      <p class="auth-sub">Enter credentials to unlock & sync E2EE forms & polls via ZEN P2P graph.</p>
      <form id="authForm" style="display:flex; flex-direction:column; gap:16px;">
        <input type="text" id="user-input" class="input-field" placeholder="Username..." required autofocus autocomplete="username">
        <input type="password" id="pass-input" class="input-field" placeholder="Passphrase..." required autocomplete="current-password">
        <button type="submit" class="btn btn-primary" style="justify-content: center; width:100%;">
          <i class="ti ti-lock-open"></i> Unlock & Sync Vault
        </button>
      </form>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
  <nav class="app-sidebar">
    <div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
      <a href="#" class="brand">
        <div class="brand-logo">
          <i class="ti ti-forms"></i>
        </div>
        <div>
          <div class="brand-text">ZenForms</div>
          <span class="brand-badge">ZEN P2P</span>
        </div>
      </a>
      <button class="theme-toggle hamburger-close" onclick="toggleSidebar()" title="Close Menu">
        <i class="ti ti-x"></i>
      </button>
    </div>

    <ul class="nav-list">
      <li>
        <button class="nav-btn active" data-tab="forms">
          <i class="ti ti-file-text"></i> My Forms
        </button>
      </li>
      <li>
        <button class="nav-btn" data-tab="polls">
          <i class="ti ti-chart-bar"></i> Live Polls
        </button>
      </li>
    </ul>

    <div class="sidebar-footer">
      <span style="font-size: 0.8rem; color: var(--text-muted); font-family: var(--font-mono);">
        v1.0.0 • ZEN P2P
      </span>
      <div style="display:flex; gap: 8px;">
        <button class="theme-toggle" onclick="window.logout()" title="Lock Vault">
          <i class="ti ti-lock"></i>
        </button>
        <button class="theme-toggle" id="themeBtn" title="Toggle Theme">
          <i class="ti ti-moon" id="themeIcon"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="app-main">
    <header class="topbar">
      <div style="display: flex; align-items: center; gap: 12px;">
        <button class="theme-toggle sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()" title="Toggle Menu">
          <i class="ti ti-menu-2"></i>
        </button>
        <h1 class="topbar-title" id="topbarTitle">
          <i class="ti ti-file-text"></i> My Forms
        </h1>
      </div>
      <div id="topbarActions" style="display:flex; gap:10px;"></div>
    </header>

    <div class="content-area">

      <!-- View 1: Forms List -->
      <section id="viewForms">
        <div class="grid-cards" id="formsGrid">
          <!-- Forms injected dynamically -->
        </div>
      </section>

      <!-- View 2: Polls List -->
      <section id="viewPolls" style="display: none;">
        <div class="grid-cards" id="pollsGrid">
          <!-- Polls injected dynamically -->
        </div>
      </section>

      <!-- View 3: Respondent View (Public / Shared Form) -->
      <section id="viewRespondent" style="display: none;">
        <div class="respondent-container" id="respondentCard">
          <!-- Dynamic Form/Poll Renderer -->
        </div>
      </section>

      <!-- View 4: Analytics View -->
      <section id="viewAnalytics" style="display: none;">
        <div style="margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
          <button class="btn btn-secondary" onclick="window.switchTab('forms')">
            <i class="ti ti-arrow-left"></i> Back to Forms
          </button>
          <button class="btn btn-secondary" onclick="window.exportAnalyticsCSV()">
            <i class="ti ti-download"></i> Export CSV
          </button>
        </div>

        <div class="analytics-card" id="analyticsContent">
          <!-- Analytics stats & charts injected -->
        </div>
      </section>

      <!-- View 5: Form Builder -->
      <section id="viewBuilder" style="display: none;">
        <div style="margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
          <button class="btn btn-secondary" onclick="window.switchTab('forms')">
            <i class="ti ti-arrow-left"></i> Cancel
          </button>
          <button class="btn btn-primary" onclick="window.saveFormFromBuilder()">
            <i class="ti ti-check"></i> Save & Publish Form
          </button>
        </div>

        <div class="builder-container">
          <input type="text" id="builderTitle" class="input-field" placeholder="Form Title..." style="font-size:1.4rem; font-weight:700;">
          <textarea id="builderDesc" class="input-field" placeholder="Form Description or Instructions..." style="min-height:70px;"></textarea>

          <h3 style="font-size: 1.1rem; font-weight: 600; margin-top: 10px;">Form Fields</h3>
          <div id="builderFields" style="display:flex; flex-direction:column; gap:16px;">
            <!-- Fields list -->
          </div>

          <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn btn-secondary" onclick="window.addFieldToBuilder('text')">
              <i class="ti ti-plus"></i> Short Text Field
            </button>
            <button class="btn btn-secondary" onclick="window.addFieldToBuilder('rating')">
              <i class="ti ti-star"></i> Rating Field
            </button>
            <button class="btn btn-secondary" onclick="window.addFieldToBuilder('radio')">
              <i class="ti ti-list-check"></i> Multiple Choice
            </button>
          </div>
        </div>
      </section>

    </div>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast">
    <i class="ti ti-check" style="color: var(--accent); font-size: 20px;"></i>
    <span id="toastMsg">Action completed successfully</span>
  </div>

  <script type="module">
    import ZEN from 'https://cdn.jsdelivr.net/gh/scobru/zen@main/zen.min.js';

    let zen;
    let pair;
    let formsMap = {};

    const relays = ["wss://delay.scobrudot.dev/zen", "wss://zen.akao.io:8420/zen"];
    zen = new ZEN({ peers: relays });

    // State management
    const AppState = {
      theme: localStorage.getItem('zenforms_theme') || 'light',
      locked: true,
      activeTab: 'forms',
      forms: [],
      polls: [],
      responses: {},
      currentBuilder: {
        id: null,
        title: '',
        description: '',
        fields: []
      }
    };

    // Theme setup
    document.documentElement.setAttribute('data-theme', AppState.theme);
    updateThemeIcon();

    document.getElementById('themeBtn').addEventListener('click', () => {
      AppState.theme = AppState.theme === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', AppState.theme);
      localStorage.setItem('zenforms_theme', AppState.theme);
      updateThemeIcon();
    });

    function updateThemeIcon() {
      const icon = document.getElementById('themeIcon');
      icon.className = AppState.theme === 'light' ? 'ti ti-moon' : 'ti ti-sun';
    }

    // Auth Unlock & ZEN Login
    document.getElementById('authForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      if (btn) {
        btn.disabled = true;
        btn.innerHTML = '<i class="ti ti-loader spin"></i> Unlocking vault...';
      }
      await new Promise(r => setTimeout(r, 50));
      try {
        await login();
      } finally {
        if (btn) {
          btn.disabled = false;
          btn.innerHTML = '<i class="ti ti-lock-open"></i> Unlock & Sync Vault';
        }
      }
    });

    async function login() {
      const u = document.getElementById('user-input').value || sessionStorage.getItem('zen_user');
      const p = document.getElementById('pass-input').value || sessionStorage.getItem('zen_pass');
      if (!u || !p) return;

      pair = await ZEN.pair(null, { seed: u + p });
      sessionStorage.setItem('zen_user', u);
      sessionStorage.setItem('zen_pass', p);
      AppState.locked = false;
      document.getElementById('authOverlay').style.display = 'none';

      // Subscribe to user's zenforms node
      zen.get('~' + pair.pub).get('zenforms').map().on((data, soul) => {
        if (!data) {
          delete formsMap[soul];
        } else {
          try {
            formsMap[soul] = {
              soul,
              id: data.id || soul,
              title: data.title || 'Untitled Form',
              description: data.description || '',
              fields: typeof data.fields === 'string' ? JSON.parse(data.fields) : (data.fields || []),
              createdAt: data.createdAt || new Date().toISOString()
            };
          } catch (err) {
            console.error('Error parsing ZEN form data:', err);
          }
        }
        syncFormsFromMap();
      });

      zen.get('~' + pair.pub).get('zenforms_polls').map().on((data, soul) => {
        if (data) {
          try {
            const idx = AppState.polls.findIndex(p => p.soul === soul);
            const parsed = {
               soul,
               id: data.id,
               title: data.title,
               options: typeof data.options === 'string' ? JSON.parse(data.options) : data.options,
               votes: typeof data.votes === 'string' ? JSON.parse(data.votes) : data.votes,
               createdAt: data.createdAt
            };
            if (idx > -1) AppState.polls[idx] = parsed;
            else AppState.polls.push(parsed);

            // Re-sort polls by createdAt
            AppState.polls.sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
            if (AppState.activeTab === 'polls') renderPolls();
          } catch(err) {}
        } else {
          const idx = AppState.polls.findIndex(p => p.soul === soul);
          if (idx > -1) AppState.polls.splice(idx, 1);
          if (AppState.activeTab === 'polls') renderPolls();
        }
      });

      zen.get('~' + pair.pub).get('zenforms_responses').map().on((data, soul) => {
        if (data) {
          try {
             if (!AppState.responses[data.formId]) AppState.responses[data.formId] = [];
             // avoid duplicates
             const exists = AppState.responses[data.formId].find(r => r.id === data.id);
             if (!exists) {
               AppState.responses[data.formId].push({
                 id: data.id,
                 data: typeof data.data === 'string' ? JSON.parse(data.data) : data.data
               });
             }
          } catch(err) {}
        }
      });

      showToast('Connected to ZEN P2P network');
    }

    // Auto-login
    if (sessionStorage.getItem('zen_user') && sessionStorage.getItem('zen_pass')) {
      login();
    }

    window.logout = function() {
      sessionStorage.removeItem('zen_user');
      sessionStorage.removeItem('zen_pass');
      window.location.reload();
    };

    function syncFormsFromMap() {
      AppState.forms = Object.values(formsMap).sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));

      if (AppState.forms.length === 0) {
        initDefaultForm();
        return;
      }

      renderView();
    }

    function initDefaultForm() {
      const defaultId = 'form_' + Date.now();
      const defaultForm = {
        id: defaultId,
        title: 'Product Satisfaction Survey',
        description: 'Help us improve the Zen ecosystem by answering 3 quick questions.',
        createdAt: new Date().toISOString(),
        fields: JSON.stringify([
          { id: 'q1', type: 'text', label: 'What is your primary use case for Zen app?', required: true },
          { id: 'q2', type: 'rating', label: 'How satisfied are you with E2EE performance?', required: true },
          { id: 'q3', type: 'radio', label: 'Would you recommend ZenForms to your team?', options: ['Yes, definitely', 'Maybe', 'No'], required: false }
        ])
      };

      zen.get('~' + pair.pub).get('zenforms').get(defaultId).put(defaultForm, null, { authenticator: pair });
    }

    // Navigation Tabs
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        window.switchTab(tab);
      });
    });

    window.toggleSidebar = function() {
      const sidebar = document.querySelector('.app-sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      if (sidebar) sidebar.classList.toggle('open');
      if (overlay) overlay.classList.toggle('show');
    };

    window.switchTab = function(tab) {
      AppState.activeTab = tab;
      if (window.innerWidth <= 768) {
        document.querySelector('.app-sidebar')?.classList.remove('open');
        document.getElementById('sidebar-overlay')?.classList.remove('show');
      }
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      const activeBtn = document.querySelector(`.nav-btn[data-tab="${tab}"]`);
      if (activeBtn) activeBtn.classList.add('active');

      ['viewForms', 'viewPolls', 'viewRespondent', 'viewAnalytics', 'viewBuilder'].forEach(v => {
        const elem = document.getElementById(v);
        if (elem) elem.style.display = 'none';
      });

      const topbarActions = document.getElementById('topbarActions');
      if (topbarActions) {
        if (tab === 'forms') {
          document.getElementById('viewForms').style.display = 'block';
          document.getElementById('topbarTitle').innerHTML = '<i class="ti ti-file-text"></i> My Forms';
          topbarActions.innerHTML = `<button class="btn btn-primary" onclick="window.openFormBuilder()"><i class="ti ti-plus"></i> Create Form</button>`;
        } else if (tab === 'polls') {
          document.getElementById('viewPolls').style.display = 'block';
          document.getElementById('topbarTitle').innerHTML = '<i class="ti ti-chart-bar"></i> Quick Polls';
          topbarActions.innerHTML = `<button class="btn btn-primary" onclick="window.createNewPoll()"><i class="ti ti-plus"></i> New Poll</button>`;
        } else if (tab === 'respondent') {
          document.getElementById('viewRespondent').style.display = 'block';
          document.getElementById('topbarTitle').innerHTML = '<i class="ti ti-pencil"></i> Respondent View';
          topbarActions.innerHTML = '';
          renderRespondentView();
        } else if (tab === 'analytics') {
          document.getElementById('viewAnalytics').style.display = 'block';
          document.getElementById('topbarTitle').innerHTML = '<i class="ti ti-chart-donut"></i> Response Vault';
          topbarActions.innerHTML = '';
          renderAnalytics();
        }
      }

      renderView();
    };

    function renderView() {
      if (AppState.activeTab === 'forms') renderForms();
      if (AppState.activeTab === 'polls') renderPolls();
    }

    // Render Forms List
    function renderForms() {
      const grid = document.getElementById('formsGrid');
      if (AppState.forms.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column: 1 / -1;">
            <i class="ti ti-forms empty-icon"></i>
            <h3>No forms created yet</h3>
            <p>Create your first encrypted form to collect feedback securely.</p>
          </div>
        `;
        return;
      }

      grid.innerHTML = AppState.forms.map(f => {
        const respCount = (AppState.responses[f.id] || []).length;
        return `
          <div class="card">
            <div class="card-header">
              <div>
                <div class="card-title">${escapeHtml(f.title)}</div>
                <div class="card-sub">${f.fields.length} questions</div>
              </div>
              <span class="badge-responses">${respCount} responses</span>
            </div>
            <p style="font-size: 0.9rem; color: var(--text-secondary);">${escapeHtml(f.description || 'No description provided.')}</p>
            <div style="display: flex; gap: 8px; margin-top: auto; padding-top: 10px;">
              <button class="btn btn-secondary" style="flex:1;" onclick="openRespondentForm('${escapeJs(f.id)}')">
                <i class="ti ti-eye"></i> Fill Form
              </button>
              <button class="btn btn-secondary" onclick="shareItem('${escapeJs(f.id)}')">
                <i class="ti ti-share"></i>
              </button>
              <button class="btn btn-danger" onclick="deleteForm('${escapeJs(f.id)}')">
                <i class="ti ti-trash"></i>
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    // Render Polls List
    function renderPolls() {
      const grid = document.getElementById('pollsGrid');
      if (AppState.polls.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column: 1 / -1;">
            <i class="ti ti-chart-bar empty-icon"></i>
            <h3>No quick polls created yet</h3>
            <p>Create a live poll to collect votes in real-time.</p>
          </div>
        `;
        return;
      }

      grid.innerHTML = AppState.polls.map(p => {
        const totalVotes = p.votes.reduce((a, b) => a + b, 0);
        return `
          <div class="card">
            <div class="card-header">
              <div class="card-title">${escapeHtml(p.title)}</div>
              <span class="badge-responses">${totalVotes} votes</span>
            </div>
            <div style="display: flex; flex-direction: column; gap: 10px;">
              ${p.options.map((opt, i) => {
                const count = p.votes[i] || 0;
                const pct = totalVotes > 0 ? Math.round((count / totalVotes) * 100) : 0;
                return `
                  <div>
                    <div style="display: flex; justify-content: space-between; font-size: 0.85rem;">
                      <span>${escapeHtml(opt)}</span>
                      <span style="font-family: var(--font-mono); font-weight: 600;">${pct}% (${count})</span>
                    </div>
                    <div class="poll-result-bar-bg">
                      <div class="poll-result-bar-fill" style="width: ${pct}%;"></div>
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
            <div style="display: flex; gap: 8px; margin-top: 10px;">
              <button class="btn btn-primary" style="flex:1;" onclick="openRespondentPoll('${escapeJs(p.id)}')">
                <i class="ti ti-vote"></i> Vote Now
              </button>
              <button class="btn btn-danger" onclick="deletePoll('${escapeJs(p.id)}')">
                <i class="ti ti-trash"></i>
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    // Form Builder Logic
    window.openFormBuilder = function(formId = null) {
      document.querySelectorAll('section').forEach(s => s.style.display = 'none');
      document.getElementById('viewBuilder').style.display = 'block';

      if (formId) {
        const existing = AppState.forms.find(f => f.id === formId);
        AppState.currentBuilder = JSON.parse(JSON.stringify(existing));
      } else {
        AppState.currentBuilder = {
          id: 'form-' + Date.now(),
          title: '',
          description: '',
          fields: [
            { id: 'q1', type: 'text', label: 'Question 1', required: true }
          ]
        };
      }

      document.getElementById('builderTitle').value = AppState.currentBuilder.title;
      document.getElementById('builderDesc').value = AppState.currentBuilder.description;
      renderBuilderFields();
    };

    function renderBuilderFields() {
      const container = document.getElementById('builderFields');
      if (!container) return;
      container.innerHTML = AppState.currentBuilder.fields.map((field, idx) => `
        <div class="field-card">
          <div class="field-card-header">
            <span style="font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-muted);">Question ${idx + 1}</span>
            <button class="btn btn-danger" style="padding: 4px 8px;" onclick="window.removeFieldFromBuilder(${idx})">
              <i class="ti ti-x"></i>
            </button>
          </div>
          <input type="text" class="input-field" value="${escapeHtml(field.label)}" onchange="window.updateFieldLabel(${idx}, this.value)" placeholder="Enter question label...">
          <div style="display: flex; gap: 12px; align-items: center;">
            <select class="input-field" style="width: 200px;" onchange="window.updateFieldType(${idx}, this.value)">
              <option value="text" ${field.type === 'text' ? 'selected' : ''}>Short Text</option>
              <option value="radio" ${field.type === 'radio' ? 'selected' : ''}>Multiple Choice</option>
              <option value="rating" ${field.type === 'rating' ? 'selected' : ''}>Star Rating</option>
            </select>
            <label style="display: flex; align-items: center; gap: 6px; font-size: 0.9rem; cursor: pointer;">
              <input type="checkbox" ${field.required ? 'checked' : ''} onchange="window.updateFieldRequired(${idx}, this.checked)"> Required
            </label>
          </div>
          ${field.type === 'radio' ? `
            <div style="margin-top: 8px;">
              <span style="font-size: 0.85rem; font-weight: 600;">Options:</span>
              ${(field.options || ['Option 1', 'Option 2']).map((opt, oIdx) => `
                <div class="option-row">
                  <input type="text" class="input-field" value="${escapeHtml(opt)}" onchange="window.updateFieldOption(${idx}, ${oIdx}, this.value)">
                </div>
              `).join('')}
              <button class="btn btn-secondary" style="margin-top: 8px; padding: 4px 10px; font-size: 0.8rem;" onclick="window.addOptionToField(${idx})">
                + Add Option
              </button>
            </div>
          ` : ''}
        </div>
      `).join('');
    }

    window.addFieldToBuilder = function(type) {
      const field = {
        id: 'q' + Date.now(),
        type: type || 'text',
        label: 'New Question',
        required: false
      };
      if (field.type === 'radio') field.options = ['Option 1', 'Option 2'];
      AppState.currentBuilder.fields.push(field);
      renderBuilderFields();
    };

    window.removeFieldFromBuilder = function(idx) {
      AppState.currentBuilder.fields.splice(idx, 1);
      renderBuilderFields();
    };

    window.updateFieldLabel = function(idx, val) { AppState.currentBuilder.fields[idx].label = val; };
    window.updateFieldType = function(idx, val) {
      AppState.currentBuilder.fields[idx].type = val;
      if (val === 'radio' && !AppState.currentBuilder.fields[idx].options) {
        AppState.currentBuilder.fields[idx].options = ['Option 1', 'Option 2'];
      }
      renderBuilderFields();
    };
    window.updateFieldRequired = function(idx, val) { AppState.currentBuilder.fields[idx].required = val; };
    window.updateFieldOption = function(idx, oIdx, val) { AppState.currentBuilder.fields[idx].options[oIdx] = val; };
    window.addOptionToField = function(idx) {
      AppState.currentBuilder.fields[idx].options.push('Option ' + (AppState.currentBuilder.fields[idx].options.length + 1));
      renderBuilderFields();
    };

    window.saveCurrentForm = function() {
      AppState.currentBuilder.title = document.getElementById('builderTitle').value.trim() || 'Untitled Form';
      AppState.currentBuilder.description = document.getElementById('builderDesc').value.trim();

      const formId = AppState.currentBuilder.id;
      const record = {
        id: formId,
        title: AppState.currentBuilder.title,
        description: AppState.currentBuilder.description,
        fields: JSON.stringify(AppState.currentBuilder.fields),
        createdAt: new Date().toISOString()
      };

      if (pair) {
        zen.get('~' + pair.pub).get('zenforms').get(formId).put(record, (ack) => {
          if (!ack.err) showToast('Form saved & synced to ZEN');
        }, { authenticator: pair });
      }

      window.switchTab('forms');
    };

    window.saveFormFromBuilder = window.saveCurrentForm;

    window.deleteForm = function(id) {
      if (confirm('Are you sure you want to delete this form?')) {
        if (pair) {
          zen.get('~' + pair.pub).get('zenforms').get(id).put(null, (ack) => {
            if (!ack.err) showToast('Form deleted from ZEN graph');
          }, { authenticator: pair });
        }
      }
    };

    // Quick Poll Creation
    window.createNewPoll = function() {
      const title = prompt('Enter your poll question:');
      const optionsStr = prompt('Enter options (comma-separated):');
      if (!title || !optionsStr) return;
      const options = optionsStr.split(',').map(s => s.trim());

      const newPoll = {
        id: 'poll-' + Date.now(),
        title: title,
        options: options,
        votes: Array(options.length).fill(0),
        createdAt: new Date().toISOString()
      };
      
      if (pair) {
        zen.get('~' + pair.pub).get('zenforms_polls').get(newPoll.id).put({
          id: newPoll.id,
          title: newPoll.title,
          options: JSON.stringify(newPoll.options),
          votes: JSON.stringify(newPoll.votes),
          createdAt: newPoll.createdAt
        }, null, { authenticator: pair });
      }

      showToast('Poll created');
    };

    window.deletePoll = function(id) {
      if (confirm('Delete this poll?')) {
        if (pair) {
          zen.get('~' + pair.pub).get('zenforms_polls').get(id).put(null, (ack) => {
            if (!ack.err) showToast('Poll deleted');
          }, { authenticator: pair });
        }
      }
    };

    // Respondent View Logic
    function renderRespondentView() {
      const area = document.getElementById('respondentCard') || document.getElementById('respondentArea');
      if (!area) return;
      if (AppState.forms.length === 0 && AppState.polls.length === 0) {
        area.innerHTML = `<div class="empty-state">No active forms or polls available.</div>`;
        return;
      }
      window.openRespondentForm(AppState.forms[0]?.id);
    }

    window.openRespondentForm = function(formId) {
      window.switchTab('respondent');
      const form = AppState.forms.find(f => f.id === formId);
      const area = document.getElementById('respondentCard') || document.getElementById('respondentArea');

      if (!form || !area) {
        if (area) area.innerHTML = `<div class="empty-state">Form not found.</div>`;
        return;
      }

      area.innerHTML = `
        <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 8px;">${escapeHtml(form.title)}</h2>
        <p style="color: var(--text-muted); margin-bottom: 24px;">${escapeHtml(form.description || '')}</p>
        
        <form id="activeFillForm" style="display:flex; flex-direction:column; gap:20px;">
          ${form.fields.map(field => `
            <div>
              <label style="display:block; font-weight:600; margin-bottom:8px;">
                ${escapeHtml(field.label)} ${field.required ? '<span style="color:var(--danger)">*</span>' : ''}
              </label>
              ${field.type === 'text' ? `
                <input type="text" name="${field.id}" class="input-field" ${field.required ? 'required' : ''}>
              ` : field.type === 'radio' ? `
                <div style="display:flex; flex-direction:column; gap:8px;">
                  ${(field.options || []).map(opt => `
                    <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
                      <input type="radio" name="${field.id}" value="${escapeHtml(opt)}" ${field.required ? 'required' : ''}>
                      <span>${escapeHtml(opt)}</span>
                    </label>
                  `).join('')}
                </div>
              ` : `
                <select name="${field.id}" class="input-field">
                  <option value="5 Stars">5 Stars ⭐⭐⭐⭐⭐</option>
                  <option value="4 Stars">4 Stars ⭐⭐⭐⭐</option>
                  <option value="3 Stars">3 Stars ⭐⭐⭐</option>
                </select>
              `}
            </div>
          `).join('')}
          <button type="submit" class="btn btn-primary" style="justify-content:center; margin-top:10px;">
            <i class="ti ti-send"></i> Encrypt & Submit Response
          </button>
        </form>
      `;

      document.getElementById('activeFillForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const responseObj = {};
        formData.forEach((val, key) => responseObj[key] = val);

        const respId = 'resp-' + Date.now();
        if (pair) {
          zen.get('~' + pair.pub).get('zenforms_responses').get(respId).put({
            id: respId,
            formId: formId,
            data: JSON.stringify(responseObj)
          }, null, { authenticator: pair });
        }

        area.innerHTML = `
          <div style="text-align:center; padding: 40px 20px;">
            <i class="ti ti-circle-check" style="font-size: 64px; color: var(--accent); margin-bottom: 16px;"></i>
            <h2>Response Submitted!</h2>
            <p style="color: var(--text-muted); margin-top: 8px;">Your response has been end-to-end encrypted and saved to the Zen graph vault.</p>
          </div>
        `;
        showToast('Response encrypted & sent');
      });
    };

    window.openRespondentPoll = function(pollId) {
      window.switchTab('respondent');
      const poll = AppState.polls.find(p => p.id === pollId);
      const area = document.getElementById('respondentCard') || document.getElementById('respondentArea');

      if (!poll || !area) return;

      area.innerHTML = `
        <h2 style="font-size: 1.4rem; font-weight: 700; margin-bottom: 16px;">${escapeHtml(poll.title)}</h2>
        <div style="display:flex; flex-direction:column; gap:12px;">
          ${poll.options.map((opt, i) => `
            <button class="btn btn-secondary" style="justify-content:flex-start; padding:14px;" onclick="window.castVote('${poll.id}', ${i})">
              <i class="ti ti-circle-dot"></i> ${escapeHtml(opt)}
            </button>
          `).join('')}
        </div>
      `;
    };

    window.castVote = function(pollId, optIdx) {
      const poll = AppState.polls.find(p => p.id === pollId);
      if (poll) {
        poll.votes[optIdx] = (poll.votes[optIdx] || 0) + 1;
        if (pair) {
          zen.get('~' + pair.pub).get('zenforms_polls').get(pollId).put({
            id: poll.id,
            title: poll.title,
            options: JSON.stringify(poll.options),
            votes: JSON.stringify(poll.votes),
            createdAt: poll.createdAt
          }, null, { authenticator: pair });
        }
        window.switchTab('polls');
        showToast('Vote recorded on Zen graph');
      }
    };

    // Render Analytics
    function renderAnalytics() {
      const container = document.getElementById('analyticsContent') || document.getElementById('analyticsList');
      if (!container) return;
      container.innerHTML = AppState.forms.map(form => {
        const resps = AppState.responses[form.id] || [];
        return `
          <div class="card">
            <div class="card-header">
              <h3 class="card-title">${escapeHtml(form.title)}</h3>
              <span class="badge-responses">${resps.length} Submissions</span>
            </div>
            ${resps.length === 0 ? `<p style="font-size:0.85rem; color:var(--text-muted);">No responses received yet.</p>` : `
              <div style="display:flex; flex-direction:column; gap:8px;">
                ${resps.map((r, i) => `
                  <div style="background:var(--bg-input); padding:10px; border-radius:8px; font-size:0.85rem; font-family:var(--font-mono);">
                    <strong>Submission #${i + 1}:</strong> ${JSON.stringify(r)}
                  </div>
                `).join('')}
              </div>
            `}
          </div>
        `;
      }).join('');
    }

    // Share & Export Helpers
    window.shareItem = function(id) {
      const url = window.location.origin + window.location.pathname + '#form=' + id;
      navigator.clipboard.writeText(url);
      showToast('Encrypted share link copied to clipboard!');
    };

    window.exportData = function(type) {
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(AppState.responses));
      const downloadAnchor = document.createElement('a');
      downloadAnchor.setAttribute("href", dataStr);
      downloadAnchor.setAttribute("download", `zenforms_vault_export.${type}`);
      document.body.appendChild(downloadAnchor);
      downloadAnchor.click();
      downloadAnchor.remove();
      showToast(`Exported responses as ${type.toUpperCase()}`);
    };

    window.exportAnalyticsCSV = window.exportData;

    function showToast(msg) {
      const toast = document.getElementById('toast');
      document.getElementById('toastMsg').innerText = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function escapeHtml(str) {
      return (str || '').replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function escapeJs(str) {
      return String(str || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }
  </script>
</body>

</html>
